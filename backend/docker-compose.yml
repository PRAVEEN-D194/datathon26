version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: crimelens_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - crimelens_network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crimelens_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGODB_URL=mongodb://mongodb:27017/crimelens
      - DB_NAME=crimelens
    depends_on:
      - mongodb
    restart: unless-stopped
    volumes:
      - .:/workspace
    networks:
      - crimelens_network

volumes:
  mongo_data:

networks:
  crimelens_network:
    driver: bridge
