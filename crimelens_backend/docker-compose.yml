version: '3.8'

services:
  fastapi_backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://mongo_db:27017/crimecop
      - REDIS_URL=redis://redis_cache:6379/0
      - JWT_SECRET=cybernexus_super_secure_key_123!
    depends_on:
      - mongo_db
      - redis_cache
    volumes:
      - .:/app

  mongo_db:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis_cache:
    image: redis:7.0
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
